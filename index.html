<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Chase - Arcade Maze Runner</title>
    <meta name="description" content="Help the thief escape the city police in this high-speed arcade maze runner.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="stat-box">
                <span class="label">SCORE</span>
                <span id="score">000000</span>
            </div>
            <div id="game-title">CITY CHASE</div>
            <div class="stat-box">
                <span class="label">LIVES</span>
                <div id="lives-container">
                    <img src="assets/player.png" class="life-icon" alt="Life">
                    <img src="assets/player.png" class="life-icon" alt="Life">
                    <img src="assets/player.png" class="life-icon" alt="Life">
                </div>
            </div>
        </header>

        <main>
            <canvas id="gameCanvas"></canvas>
            
            <div id="overlay" class="hidden">
                <div class="overlay-content">
                    <h2 id="overlay-title">GAME OVER</h2>
                    <p id="overlay-message">You were busted by the police!</p>
                    <button id="restart-btn">START MISSION</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Collect all <span class="highlight">Money Bags</span> and avoid the <span class="danger">Police</span>.</p>
            <p>Use <span class="highlight">Diamonds</span> to turn the tables!</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
